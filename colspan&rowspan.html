<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>colspan&rowspan</title>
</head>
<body>
  <table border="black"> <!--table-->

    <captain><b>  Food  meanu</b></captain> <!--caption-->

    <thead> <!--we use thead that can wrape header-->

      <tr> <!-- table row-->
        <th rowspan="2"> Item</th> <!-- here nwe use rowspan that can capture space of two row-->
        <th colspan="2"> price</th> <!-- here we can use colspan that can capture capture two coloumn-->
       </tr>

      <tr>
        <th>INR</th> <!-- here also a table header that can store in column-->
        <th> USD</th>
      </tr>
    </thead>

    <tbody> <!--body of the table-->
      <tr> <!--table row-->
        <td>frooti</td> <!--table data-->
        <td>10</td>
        <td>0.14</td>
      </tr>
      <tr>
        <td>samosha</td>
        <td>12</td>
        <td>0.17</td>
      </tr>
      <tr>
        <td>chips</td>
        <td>20</td>
        <td>0.28</td>
      </tr>
    </tbody>

  </table>
</body>
</html>
